<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <title>CONTATO</title>
  </head>
  <body>
    <header class="header-info">
      <div class="container-contato">
        <span class="logo">Catálogo</span>
        <nav class="menu">
          <ul>
            <li>
              <a href="começo.html">
                <i class="fa-solid fa-bars menu-icon"></i>Catálogo
              </a>
            </li>
            <li class="header-contato selecionado">
              <a href="/projeto/contato.html">
                <i class="fa-solid fa-phone"></i>Contato
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="contato">
      <h2><i class="fa-solid fa-phone"> </i>Fale Conosco</h2>

      <form class="form-contato">
        <fieldset>
          <input
            maxlength="100"
            minlength="4"
            type="text"
            placeholder="Seu nome...."
            required
          />

          <input
            maxlength="50"
            minlength="15"
            type="email"
            placeholder="Seu e-mail...."
            required
          />

          <textarea
            maxlength="300"
            placeholder="Digite sua mensagem...."
            required
          ></textarea>

          <button type="submit">Enviar</button>
        </fieldset>
      </form>

      <div class="info-contato">
        <h3>Contatos</h3>

        <p><i class="fa-solid fa-phone"></i> (21) 00000-1111</p>
        <p><i class="fa-solid fa-envelope"></i>SushiJu@gmail.com</p>
        <p><i class="fa-solid fa-location-dot"></i> Rua aaaaaa, 321</p>
        <p><i class="fa-solid fa-clock"></i> Seg - Dom | 11:00 às 23:00</p>
        <p><i class="fa-brands fa-instagram instagram-icon"></i>@SushiJuOff</p>
      </div>
    </main>
    <footer class="rodape">
      <p>@ joao pedro Nascimento de Freitas .2026</p>
    </footer>
  </body>
</html>
